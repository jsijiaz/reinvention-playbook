<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jackman Reinvention Playbook</title>
  <link rel="icon" href="https://www.jackmanreinvents.com/favicon.ico" />
  <script src="pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e94560;
      --text: #eaeaea;
      --muted: #8892a4;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* ── Password gate ─────────────────────────────────────────────────────── */
    #gate {
      position: fixed; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 100;
    }

    #gate-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 360px;
      padding: 0 32px;
    }

    #gate-logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    #gate-heading {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      line-height: 1.4;
    }

    #gate-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    #gate-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.2s;
    }
    #gate-input:focus { border-color: rgba(255,255,255,0.3); }
    #gate-input.error { border-color: var(--accent); animation: shake 0.3s ease; }

    #gate-submit {
      width: 100%;
      padding: 12px;
      background: #333;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: Arial, sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    #gate-submit:hover { background: #444; }

    #gate-error {
      font-size: 13px;
      color: var(--accent);
      text-align: center;
      min-height: 18px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #gate-error.visible { opacity: 1; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    /* ── Viewer ──────────────────────────────────────────────────────────────── */
    #viewer { display: none; }

    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #error-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }
    #error-msg p { font-size: 15px; }
    #error-msg small { font-size: 12px; opacity: 0.6; }

    #slide-wrap {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
    }

    #canvas-container {
      position: relative;
      background: #fff;
      line-height: 0;
      overflow: hidden;
    }

    #pdf-canvas {
      display: block;
    }

    #link-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #link-layer a {
      position: absolute;
      pointer-events: all;
      cursor: pointer;
      border-radius: 2px;
    }
    #link-layer a:hover {
      background: rgba(233,69,96,0.18);
      outline: 1px solid rgba(233,69,96,0.5);
    }

    /* ── Side nav buttons ── */
    .nav-zone {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 30;
      pointer-events: none; /* zone never intercepts clicks — JS controls visibility */
    }
    #prev-zone { left: 16px; }
    #next-zone { right: 16px; }

    .nav-btn {
      width: 44px; height: 76px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.18s ease, transform 0.18s ease, background 0.15s;
      pointer-events: none;
    }
    .nav-btn.visible {
      opacity: 1;
      transform: scale(1);
      pointer-events: all;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.18); }

    #top-controls {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%) translateY(-100%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.09);
      border-top: none;
      border-radius: 0 0 12px 12px;
      backdrop-filter: blur(14px);
      z-index: 20;
      transition: transform 0.22s ease, opacity 0.22s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    #stage:hover #top-controls {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .zoom-btn {
      width: 26px; height: 26px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.07);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .zoom-btn:hover { background: rgba(255,255,255,0.15); }
    #zoom-level { font-size: 12px; color: var(--muted); min-width: 36px; text-align: center; }
    .sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); }

    #page-jump-wrap { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    #page-input {
      width: 36px; padding: 2px 5px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      color: var(--text); font-size: 12px; text-align: center; outline: none;
      transition: border-color 0.15s;
    }
    #page-input:focus { border-color: var(--accent); }
    #page-input::-webkit-inner-spin-button,
    #page-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    #page-input[type=number] { -moz-appearance: textfield; }

    #progress-bar {
      position: absolute;
      bottom: 0; left: 0; height: 2px;
      background: var(--accent);
      transition: width 0.2s ease;
      z-index: 20;
      border-radius: 0 2px 2px 0;
      pointer-events: none;
    }

    #thumb-trigger {
      position: absolute;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: none;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.18s;
      padding: 6px 14px 4px;
    }
    #thumb-trigger:hover { opacity: 0.9; }

    #thumb-strip {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(100%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px 12px;
      background: rgba(90,90,90,0.38);
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      max-width: calc(100vw - 160px);
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
      z-index: 29;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0;
      pointer-events: none;
    }
    #thumb-strip::-webkit-scrollbar { height: 3px; }
    #thumb-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    #thumb-trigger:hover ~ #thumb-strip,
    #thumb-strip:hover {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .thumb {
      flex-shrink: 0;
      width: 46px; height: 60px;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.55;
      transition: opacity 0.15s, border-color 0.15s;
      background: #fff;
    }
    .thumb canvas { width: 100%; height: 100%; object-fit: contain; display: block; }
    .thumb:hover { opacity: 0.85; }
    .thumb.active { border-color: var(--accent); opacity: 1; }

    #loader {
      display: none;
      position: absolute; inset: 0;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4);
      z-index: 30; border-radius: 4px;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

<!-- ── Password gate ──────────────────────────────────────────────────────── -->
<div id="gate">
  <div id="gate-card">
    <form id="gate-form" autocomplete="off">
      <input
        id="gate-input"
        type="password"
        placeholder="Password"
        autocomplete="new-password"
        autofocus
      />
      <button id="gate-submit" type="submit">Enter</button>
      <div id="gate-error">Incorrect password. Please try again.</div>
    </form>
  </div>
</div>

<!-- ── Viewer ─────────────────────────────────────────────────────────────── -->
<div id="viewer">
<div id="stage">

  <div id="error-msg">
    <p id="error-text">Could not load PDF</p>
    <small id="error-detail"></small>
  </div>

  <div id="slide-wrap">
    <div id="top-controls">
      <button class="zoom-btn" id="zoom-out">−</button>
      <span id="zoom-level">100%</span>
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-fit" style="font-size:11px;width:auto;padding:0 8px;">Fit</button>
      <div class="sep"></div>
      <div id="page-jump-wrap">
        <input type="number" id="page-input" min="1" title="Jump to page — press Enter" />
        <span id="total-pages">/ —</span>
      </div>
    </div>

    <div class="nav-zone" id="prev-zone">
      <button class="nav-btn" id="prev-btn">&#8249;</button>
    </div>
    <div id="canvas-container">
      <canvas id="pdf-canvas"></canvas>
      <div id="link-layer"></div>
      <div id="loader"><div class="spinner"></div></div>
    </div>
    <div class="nav-zone" id="next-zone">
      <button class="nav-btn" id="next-btn">&#8250;</button>
    </div>

    <div id="thumb-trigger">
      <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
        <polyline points="2,9 11,2 20,9" stroke="white" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div id="thumb-strip"></div>
    <div id="progress-bar"></div>
  </div>

</div>
</div>

<script>
  // ── ADMIN CONFIG ────────────────────────────────────────────────────────────
  const PDF_PATH = 'playbook.pdf';
  // ───────────────────────────────────────────────────────────────────────────

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';

  // ── Auth ───────────────────────────────────────────────────────────────────
  const AUTH_KEY  = 'pb_auth';
  // SHA-256 of '80Atlantic' — change this if you change the password
  const PW_HASH   = 'ee5192bad6ad2982d8d0249fc6f6a262947ae83be4ffc500936d883f61a1c757';

  async function sha256(str) {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  function isAuthed() {
    return localStorage.getItem(AUTH_KEY) === 'true';
  }

  function grantAccess() {
    localStorage.setItem(AUTH_KEY, 'true');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('viewer').style.display = 'block';
    bootViewer();
  }

  // Check on load
  if (isAuthed()) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('viewer').style.display = 'block';
  }

  // Gate form
  document.getElementById('gate-form').addEventListener('submit', async e => {
    e.preventDefault();
    const input    = document.getElementById('gate-input');
    const errorEl  = document.getElementById('gate-error');
    const hash     = await sha256(input.value);
    if (hash === PW_HASH) {
      grantAccess();
    } else {
      input.value = '';
      input.classList.add('error');
      errorEl.classList.add('visible');
      setTimeout(() => input.classList.remove('error'), 400);
      setTimeout(() => errorEl.classList.remove('visible'), 3000);
    }
  });

  // ── Viewer ─────────────────────────────────────────────────────────────────
  let pdfDoc = null, currentPage = 1, totalPages = 0;
  let scale = 1.0, autoScale = 1.0;
  let rendering = false, pendingPage = null;
  let _lastAutoScale = null;

  const canvas       = document.getElementById('pdf-canvas');
  const ctx          = canvas.getContext('2d');
  const linkLayer    = document.getElementById('link-layer');
  const loader       = document.getElementById('loader');
  const slideWrap    = document.getElementById('slide-wrap');
  const errorMsg     = document.getElementById('error-msg');
  const thumbStrip   = document.getElementById('thumb-strip');
  const thumbTrigger = document.getElementById('thumb-trigger');
  const progressBar  = document.getElementById('progress-bar');
  const prevBtn      = document.getElementById('prev-btn');
  const nextBtn      = document.getElementById('next-btn');
  const zoomInBtn    = document.getElementById('zoom-in');
  const zoomOutBtn   = document.getElementById('zoom-out');
  const zoomFitBtn   = document.getElementById('zoom-fit');
  const zoomLabel    = document.getElementById('zoom-level');
  const pageInput    = document.getElementById('page-input');
  const totalPagesEl = document.getElementById('total-pages');

  async function bootViewer() {
    try {
      pdfDoc = await pdfjsLib.getDocument({ url: PDF_PATH, withCredentials: false }).promise;
      totalPages = pdfDoc.numPages;
      currentPage = 1;
      totalPagesEl.textContent = `/ ${totalPages}`;
      pageInput.max = totalPages;
      await computeAutoScale();
      scale = autoScale;
      updateZoomLabel();
      errorMsg.style.display = 'none';
      slideWrap.style.display = 'flex';
      thumbTrigger.style.display = 'flex';
      buildThumbs();
      renderPage(currentPage, 'fwd');
    } catch (err) {
      errorMsg.style.display = 'flex';
      document.getElementById('error-detail').textContent =
        'Could not load the PDF. Check the file is shared publicly on Google Drive.';
    }
  }

  // Boot immediately if already authed
  if (isAuthed()) bootViewer();

  async function computeAutoScale() {
    const page = await pdfDoc.getPage(1);
    const vp = page.getViewport({ scale: 1 });
    autoScale = Math.min(window.innerWidth / vp.width, window.innerHeight / vp.height);
  }

  function updateZoomLabel() {
    zoomLabel.textContent = Math.round(scale * 100) + '%';
  }

  async function renderPage(num, dir = 'fwd') {
    if (rendering) { pendingPage = { num, dir }; return; }
    rendering = true;
    loader.style.display = 'flex';

    await computeAutoScale();
    if (_lastAutoScale === null || Math.abs(scale - _lastAutoScale) < 0.01) {
      scale = autoScale; updateZoomLabel();
    }
    _lastAutoScale = autoScale;

    const page = await pdfDoc.getPage(num);
    const dpr  = Math.max(window.devicePixelRatio || 1, 2); // minimum 2× for crispness
    const vp   = page.getViewport({ scale });
    const vpHD = page.getViewport({ scale: scale * dpr });
    canvas.width  = vpHD.width;
    canvas.height = vpHD.height;
    canvas.style.width  = vp.width  + 'px';
    canvas.style.height = vp.height + 'px';
    await page.render({ canvasContext: ctx, viewport: vpHD, intent: 'print' }).promise;
    renderLinks(page, vp);

    loader.style.display = 'none';

    pageInput.value = num;
    progressBar.style.width = (num / totalPages * 100) + '%';
    prevBtn.classList.remove('visible');
    nextBtn.classList.remove('visible');
    highlightThumb(num);

    rendering = false;
    if (pendingPage) {
      const { num: pn, dir: pd } = pendingPage; pendingPage = null;
      renderPage(pn, pd);
    }
  }

  async function renderLinks(page, viewport) {
    linkLayer.innerHTML = '';
    const annotations = await page.getAnnotations();
    annotations.forEach(ann => {
      if (ann.subtype !== 'Link' || !ann.rect) return;
      const [x1,y1,x2,y2] = viewport.convertToViewportRectangle(ann.rect);
      const a = document.createElement('a');
      a.style.left   = Math.min(x1,x2)+'px'; a.style.top    = Math.min(y1,y2)+'px';
      a.style.width  = Math.abs(x2-x1)+'px'; a.style.height = Math.abs(y2-y1)+'px';
      if (ann.url) {
        a.href = ann.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
      } else if (ann.dest || ann.action?.dest) {
        const dest = ann.dest || ann.action.dest;
        a.href = '#';
        a.addEventListener('click', async e => {
          e.preventDefault();
          try {
            const arr = Array.isArray(dest)
              ? dest
              : await pdfDoc.getDestination(dest);
            if (!arr || !arr.length) return;
            const ref = arr[0];
            const idx = (typeof ref === 'number')
              ? ref
              : await pdfDoc.getPageIndex(ref);
            if (idx != null) goTo(idx + 1);
          } catch(_) {}
        });
      } else return;
      linkLayer.appendChild(a);
    });
  }

  function goTo(num, dir) {
    if (!pdfDoc || num < 1 || num > totalPages) return;
    const d = dir ?? (num >= currentPage ? 'fwd' : 'back');
    currentPage = num;
    renderPage(currentPage, d);
  }

  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');

  prevBtn.addEventListener('click', () => goTo(currentPage - 1, 'back'));
  nextBtn.addEventListener('click', () => goTo(currentPage + 1, 'fwd'));

  // Show nav buttons when mouse is near the edges; never block PDF link clicks
  const EDGE = 80; // px from edge to trigger
  document.getElementById('stage').addEventListener('mousemove', e => {
    const x = e.clientX, w = window.innerWidth;
    prevBtn.classList.toggle('visible', x < EDGE && currentPage > 1);
    nextBtn.classList.toggle('visible', x > w - EDGE && currentPage < totalPages);
  });
  document.getElementById('stage').addEventListener('mouseleave', () => {
    prevBtn.classList.remove('visible');
    nextBtn.classList.remove('visible');
  });

  document.addEventListener('keydown', e => {
    if (!pdfDoc || document.activeElement === pageInput) return;
    if (e.key === 'ArrowRight' || e.key === 'PageDown') goTo(currentPage + 1, 'fwd');
    if (e.key === 'ArrowLeft'  || e.key === 'PageUp')   goTo(currentPage - 1, 'back');
    if (e.key === 'Home') goTo(1, 'back');
    if (e.key === 'End')  goTo(totalPages, 'fwd');
  });

  pageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const n = parseInt(pageInput.value, 10);
      if (n >= 1 && n <= totalPages) goTo(n);
      else pageInput.value = currentPage;
      pageInput.blur();
    }
    if (e.key === 'Escape') { pageInput.value = currentPage; pageInput.blur(); }
  });
  pageInput.addEventListener('blur', () => { pageInput.value = currentPage; });

  document.getElementById('stage').addEventListener('wheel', e => {
    if (!pdfDoc) return;
    e.preventDefault();
    if (e.ctrlKey || e.metaKey) setZoom(scale + (e.deltaY < 0 ? 0.1 : -0.1));
    else goTo(currentPage + (e.deltaY > 0 ? 1 : -1));
  }, { passive: false });

  function setZoom(z) {
    scale = Math.max(0.25, Math.min(4, z));
    updateZoomLabel();
    renderPage(currentPage);
  }
  zoomInBtn.addEventListener('click',  () => setZoom(scale + 0.15));
  zoomOutBtn.addEventListener('click', () => setZoom(scale - 0.15));
  zoomFitBtn.addEventListener('click', () => { _lastAutoScale = null; setZoom(autoScale); });

  async function buildThumbs() {
    thumbStrip.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const page = await pdfDoc.getPage(i);
      const vp = page.getViewport({ scale: 0.14 });
      const c = document.createElement('canvas');
      c.width = vp.width; c.height = vp.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
      const div = document.createElement('div');
      div.className = 'thumb'; div.dataset.page = i; div.title = `Page ${i}`;
      div.appendChild(c);
      div.addEventListener('click', () => goTo(i));
      thumbStrip.appendChild(div);
    }
    highlightThumb(currentPage);
  }

  function highlightThumb(num) {
    document.querySelectorAll('.thumb').forEach(t => {
      const active = Number(t.dataset.page) === num;
      t.classList.toggle('active', active);
      if (active) t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });
  }

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (!pdfDoc) return;
      _lastAutoScale = null;
      renderPage(currentPage);
    }, 150);
  });
</script>
</body>
</html>
